<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="500" viewBox="0 0 1800 500">
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <style>
      .serif { font-family: "Times New Roman", Georgia, serif; fill: #ffffff; }
      .small { letter-spacing: 6px; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#000000"/>

  <!-- emblem -->
  <g transform="translate(70,70)" stroke="#ffffff" fill="none" filter="url(#roughen)">
    <circle cx="145" cy="180" r="120" stroke-width="7"/>
    <circle cx="145" cy="180" r="114" stroke-width="2.5" opacity="0.75"/>

    <!-- cross -->
    <path d="M55 150
             C78 148, 95 145, 112 146
             L113 102
             C113 92, 118 84, 126 84
             C134 84, 138 92, 138 102
             L137 146
             C163 146, 186 147, 204 151
             C185 157, 161 160, 136 160
             L134 242
             C134 252, 129 258, 122 258
             C114 258, 110 252, 110 242
             L112 160
             C94 160, 74 158, 55 150 Z"
          fill="#ffffff" stroke="none"/>

    <!-- stones / cornerstone -->
    <g transform="translate(112,212) rotate(-18)">
      <path d="M0 18 L46 0 L86 18 L40 37 Z" fill="#ffffff" stroke="none"/>
      <path d="M47 2 L84 18 L63 52 L24 34 Z" fill="#d9d9d9" stroke="none"/>
      <path d="M5 20 L40 37 L19 59 L-12 41 Z" fill="#bfbfbf" stroke="none"/>
      <path d="M42 38 L78 20 L58 54 L22 58 Z" fill="#f0f0f0" stroke="none"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(430,170)">
    <text class="serif" x="0" y="70" font-size="116" font-weight="500" letter-spacing="2">CORNERSTONE</text>
    <line x1="10" y1="128" x2="130" y2="128" stroke="#ffffff" stroke-width="3"/>
    <text class="serif small" x="150" y="145" font-size="48">SLAVIC BIBLE CHURCH</text>
    <line x1="1100" y1="128" x2="1220" y2="128" stroke="#ffffff" stroke-width="3"/>
  </g>
</svg>
